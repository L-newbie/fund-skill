<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funds-Skills API Validator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3348;
  --text:#e4e6eb;--text2:#9ca0b0;--text3:#6b7085;
  --green:#00d68f;--red:#ff6b6b;--yellow:#ffc107;--blue:#4da6ff;--purple:#a78bfa;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.header .actions{margin-left:auto;display:flex;gap:10px}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:12px 0;flex-shrink:0}
.sidebar-item{padding:10px 20px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text2);display:flex;align-items:center;gap:8px;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{color:var(--blue);background:rgba(77,166,255,.08);border-left-color:var(--blue)}
.sidebar-item .icon{font-size:16px}
.sidebar-count{font-size:11px;background:var(--surface2);padding:1px 7px;border-radius:10px;color:var(--text3);margin-left:auto}
.main{flex:1;padding:24px;overflow-y:auto}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;min-width:120px;display:flex;flex-direction:column;gap:4px}
.stat-card .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:22px;font-weight:700}
.stat-card .value.green{color:var(--green)}
.stat-card .value.red{color:var(--red)}
.stat-card .value.yellow{color:var(--yellow)}
.stat-card .value.blue{color:var(--blue)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s}
.card:hover{border-color:var(--blue);box-shadow:0 0 20px rgba(77,166,255,.1)}
.card-header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.card-header .name{font-size:14px;font-weight:600;flex:1}
.badge-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.badge-success{background:rgba(0,214,143,.12);color:var(--green)}
.badge-error{background:rgba(255,107,107,.12);color:var(--red)}
.badge-loading{background:rgba(255,193,7,.12);color:var(--yellow)}
.badge-idle{background:var(--surface2);color:var(--text3)}
.badge-skip{background:var(--surface2);color:var(--text3)}
.card-body{padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.param-row{display:flex;align-items:center;gap:8px}
.param-label{font-size:12px;color:var(--text3);min-width:80px}
.param-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;transition:border .2s}
.param-input:focus{border-color:var(--blue)}
.card-footer{padding:10px 18px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border)}
.btn-test{padding:5px 14px;font-size:12px;border-radius:6px;border:none;cursor:pointer;font-weight:600;transition:all .2s;background:var(--blue);color:#fff}
.btn-test:hover{opacity:.85}
.btn-test:disabled{opacity:.5;cursor:not-allowed}
.result-time{font-size:11px;color:var(--text3)}
.result-detail{font-size:11px;color:var(--text3);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-expand{padding:0 18px 14px;cursor:pointer}
.expand-toggle{font-size:12px;color:var(--blue);cursor:pointer;user-select:none}
.expand-toggle:hover{text-decoration:underline}
.response-box{margin-top:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:300px;overflow:auto;font-family:'Fira Code',Consolas,monospace;font-size:11px;line-height:1.5;color:var(--text2);white-space:pre-wrap;word-break:break-all;display:none}
.response-box.show{display:block}
.response-box .key{color:var(--purple)}
.response-box .str{color:var(--green)}
.response-box .num{color:var(--yellow)}
.footer{background:var(--surface);border-top:1px solid var(--border);padding:10px 24px;font-size:11px;color:var(--text3);text-align:center}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid var(--surface2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@media(max-width:768px){.sidebar{display:none}.grid{grid-template-columns:1fr}.header{flex-wrap:wrap}.header .actions{margin-left:0;width:100%}}
</style>
</head>
<body>

<div class="header">

  <span class="badge" id="statusBadge">就绪</span>
  <div class="actions">
    <button class="btn btn-primary" id="btnAll" onclick="runAll()">▶ 全部验证</button>
    <button class="btn btn-secondary" onclick="resetAll()">↻ 重置</button>
    <button class="btn btn-secondary" id="btnExport" onclick="exportLog()" style="display:none">📋 导出日志</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="stats-bar" id="statsBar"></div>
    <div class="grid" id="grid"></div>

</div>

<div class="footer">Funds-Skills Validator v1.0 · 数据来源：东方财富 / 天天基金 / 腾讯 / 新浪 / RSS</div>

<script>
// ==================== API Registry ====================
// AUTO-GENERATED START
const API_REGISTRY = {
fund: {

      { id:'fund-real-time-valuation', name:'实时估值', method:'jsonp', callback:'jsonpgz', dispatcher:'jsonpgz', buildUrl:p => `https://fundgz.1234567.com.cn/js/${p.code}.js?rt=${Date.now()}`, defaultParam:{"code":"110011"}, paramHints:{"code":"基金代码"}, validate: d => d !== null && d !== undefined, extract: d => d },

      { id:'fund-historical-nav-f10', name:'历史净值', method:'script', globalVar:'apidata', buildUrl:p => `https://fundf10.eastmoney.com/F10DataApi.aspx?type=lsjz&code=${p.code}&page=${p.page}&per=${p.perPage}&sdate=${p.sdate}&edate=${p.edate}`, defaultParam:{"code":"110011","page":"1","perPage":"10","sdate":"","edate":""}, paramHints:{"code":"基金代码","page":"page","perPage":"perPage","sdate":"sdate","edate":"edate"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'fund-fund-search', name:'基金搜索', method:'jsonp', buildUrl:p => `https://fundsuggest.eastmoney.com/FundSearch/api/FundSearchAPI.ashx?m=1&key=${p.keyword}&pageSize=50&callback=_cb`, defaultParam:{"keyword":"沪深300"}, paramHints:{"keyword":"关键词"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'fund-fund-code-catalog', name:'全量目录', method:'script', globalVar:'r', buildUrl:() => `https://fund.eastmoney.com/js/fundcode_search.js`, defaultParam:{}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'fund-fund-holdings', name:'基金持仓', method:'script', globalVar:'apidata', buildUrl:p => `https://fundf10.eastmoney.com/FundArchivesDatas.aspx?type=jjcc&code=${p.code}&topline=${p.topline}&year=${p.year}&month=${p.month}&_=${Date.now()}`, defaultParam:{"code":"110011","topline":"10","year":"","month":""}, paramHints:{"code":"基金代码","topline":"topline","year":"year","month":"month"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'fund-intraday-estimate', name:'盘中估值走势', method:'jsonp', buildUrl:p => `https://stock.finance.sina.com.cn/fundInfo/api/openapi.php/FdFundService.getEstimateNetworthPic?symbol=${p.code}&callback=_cb`, defaultParam:{"code":"110011"}, paramHints:{"code":"基金代码"}, validate: d => d !== null && d !== undefined, extract: d => d }
      ]
    },
'global-index': {
      label:'全球指数', icon:'🌍',
      apis:[
      { id:'global-index-a-share-indices', name:'A-Share Indices', method:'jsonp', buildUrl:p => `https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=${p.secids}&fields=f2,f3,f4,f12,f14&cb=_cb`, defaultParam:{"secids":"1.000001"}, paramHints:{"secids":"secids"}, validate: d => d !== null && d !== undefined, extract: d => d }
      ]
    },
'market-resolve': {
      label:'市场解析', icon:'🔍',
      apis:[
      { id:'market-resolve-tencent-smartbox', name:'腾讯智能搜索', method:'script', globalVar:'v_hint', buildUrl:p => `https://smartbox.gtimg.cn/s3/?q=${p.keyword}&t=all`, defaultParam:{"keyword":"沪深300"}, paramHints:{"keyword":"关键词"}, validate: d => d !== null && d !== undefined, extract: d => d }
      ]
    },
news: {
      label:'财经资讯', icon:'📰',
      apis:[
      { id:'news-sina-finance', name:'新浪财经', method:'jsonp', buildUrl:p => `https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=${p.lid}&k=&num=50&page=${p.page}&callback=_cb`, defaultParam:{"lid":"2509","page":"1"}, paramHints:{"lid":"lid","page":"page"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'news-eastmoney-24h-news', name:'东方财富快讯', method:'jsonp', buildUrl:p => `https://push2.eastmoney.com/api/qt/clist/get?cb=_cb&fid=ctime&po=1&pz=50&pn=${p.page}&np=1&fltt=2&invt=2&fs=${p.fs}&fields=f12,f14,f16,f17,f20`, defaultParam:{"page":"1","fs":"m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23"}, paramHints:{"page":"page","fs":"fs"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'news-overseas-rss-yahoo', name:'Overseas RSS — Yahoo Finance', method:'fetch', buildUrl:p => `https://api.rss2json.com/v1/api.json?rss_url=${p.encodedFeedUrl}`, defaultParam:{"encodedFeedUrl":"https%3A%2F%2Ffinance.yahoo.com%2Fnews%2Frssindex"}, paramHints:{"encodedFeedUrl":"encodedFeedUrl"}, validate: d => d !== null && d !== undefined, extract: d => d }
      ]
    },
stock: {
      label:'股票', icon:'📈',
      apis:[
      { id:'stock-batch-stock-quotes', name:'批量行情', method:'jsonp', buildUrl:p => `https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=${p.secids}&fields=f2,f3,f4,f12,f14&cb=_cb`, defaultParam:{"secids":"1.000001"}, paramHints:{"secids":"secids"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'stock-stock-search', name:'股票搜索', method:'jsonp', buildUrl:p => `https://searchapi.eastmoney.com/api/suggest/get?input=${p.keyword}&type=14&token=D43BF722C8E33BDC906FB84D85E326E8&count=10&cb=_cb`, defaultParam:{"keyword":"沪深300"}, paramHints:{"keyword":"关键词"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'stock-yesterdays-change-a-share', name:'昨日涨跌', method:'jsonp', buildUrl:p => `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${p.secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&klt=101&fqt=0&end=20500101&lmt=6&cb=_cb`, defaultParam:{"secid":"1.600519"}, paramHints:{"secid":"secid"}, validate: d => d !== null && d !== undefined, extract: d => d },
      { id:'stock-tencent-quotes', name:'腾讯行情', method:'fetch-gbk', buildUrl:p => `https://qt.gtimg.cn/q=${p.codes}`, defaultParam:{"codes":"sh600519"}, paramHints:{"codes":"codes"}, validate: d => d !== null && d !== undefined, extract: d => d }
      ]
    }
  };
// AUTO-GENERATED END

// ==================== State ====================
const state = { activeBoard: Object.keys(API_REGISTRY)[0], results: {}, running: false };
const STATUSES = { idle:'idle', loading:'loading', success:'success', error:'error', skip:'skip' };
const STATUS_TEXT = { idle:'待检测', loading:'检测中...', success:'可用', error:'失败', skip:'跳过' };
const STATUS_CLASS = { idle:'badge-idle', loading:'badge-loading', success:'badge-success', error:'badge-error', skip:'badge-skip' };

// ==================== JSONP Infra ====================
let cbCounter = 0;
// jsonpgz dispatcher
const pendingGz = new Map();
let gzInstalled = false;
function installGzDispatcher() {
  if (gzInstalled) return;
  gzInstalled = true;
  window.jsonpgz = (data) => {
    const code = data?.fundcode ?? '';
    if (code && pendingGz.has(code)) {
      const entries = pendingGz.get(code);
      pendingGz.delete(code);
      entries.forEach(e => { clearTimeout(e.timer); e.resolve(data); });
    }
  };
}

function jsonpRequest(url, callbackName, timeout = 15000) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, timeout);
    function cleanup() { clearTimeout(timer); window[callbackName] = undefined; script.remove?.(); }
    window[callbackName] = (data) => { cleanup(); resolve(data); };
    script.src = url;
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    document.head.appendChild(script);
  });
}

function jsonpgzRequest(fundCode) {
  installGzDispatcher();
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      const entries = pendingGz.get(fundCode);
      if (entries) { const i = entries.findIndex(e => e.script === script); if (i>=0) entries.splice(i,1); if (!entries.length) pendingGz.delete(fundCode); }
      script.remove?.(); reject(new Error('Timeout'));
    }, 10000);
    const entry = { resolve, timer, script };
    if (pendingGz.has(fundCode)) pendingGz.get(fundCode).push(entry);
    else pendingGz.set(fundCode, [entry]);
    script.src = `https://fundgz.1234567.com.cn/js/${fundCode}.js?rt=${Date.now()}`;
    script.onerror = () => {
      const entries = pendingGz.get(fundCode);
      if (entries) { const i = entries.findIndex(e => e.script === script); if (i>=0) entries.splice(i,1); if (!entries.length) pendingGz.delete(fundCode); }
      clearTimeout(timer); script.remove?.(); reject(new Error('Network error'));
    };
    document.head.appendChild(script);
  });
}

function scriptTagLoad(url, globalVar, timeout = 15000) {
  return new Promise((resolve, reject) => {
    const w = window;
    const prevVal = w[globalVar];
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); resolve(null); }, timeout);
    function cleanup() { clearTimeout(timer); script.remove?.(); }
    script.src = url;
    script.onload = () => {
      const val = w[globalVar];
      if (val !== undefined && val !== prevVal) { w[globalVar] = undefined; cleanup(); resolve(val); }
      else { cleanup(); resolve(null); }
    };
    script.onerror = () => { cleanup(); resolve(null); };
    document.head.appendChild(script);
  });
}

function apidataLoad(url, timeout = 15000) {
  return new Promise((resolve, reject) => {
    const w = window;
    let resolved = false;
    w.apidata = (data) => { if (resolved) return; resolved = true; cleanup(); resolve(data); };
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      if (!resolved) {
        const val = w.apidata;
        if (val && typeof val === 'object' && !(val instanceof Function)) { resolved = true; cleanup(); resolve(val); return; }
        resolved = true; cleanup(); resolve(null);
      }
    }, timeout);
    function cleanup() { clearTimeout(timer); w.apidata = undefined; script.remove?.(); }
    script.src = url;
    script.onload = () => {
      if (resolved) return;
      const val = w.apidata;
      if (val && typeof val === 'object' && !(val instanceof Function)) { resolved = true; cleanup(); resolve(val); }
      else { resolved = true; cleanup(); resolve(null); }
    };
    script.onerror = () => { if (!resolved) { resolved = true; cleanup(); resolve(null); } };
    document.head.appendChild(script);
  });
}

async function fetchGbk(url, timeout = 15000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeout);
  try {
    const resp = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    const buf = await resp.arrayBuffer();
    return new TextDecoder('gbk').decode(buf);
  } catch(e) { clearTimeout(t); throw e; }
}

async function fetchJson(url, timeout = 15000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeout);
  try {
    const resp = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    return await resp.json();
  } catch(e) { clearTimeout(t); throw e; }
}

// ==================== Test Runner ====================
async function runTest(api) {
  const cb = `_vcb_${Date.now()}_${cbCounter++}`;
  const t0 = performance.now();
  let raw;
  const mergedParam = { ...api.defaultParam };
  // read custom params from inputs
  const card = document.getElementById(`card-${api.id}`);
  if (card) {
    card.querySelectorAll('.param-input').forEach(inp => {
      if (inp.value.trim()) mergedParam[inp.dataset.key] = inp.value.trim();
    });
  }
  const url = api.buildUrl(mergedParam);

  // Try up to 2 times (retry once on failure for unstable APIs)
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      if (api.dispatcher === 'jsonpgz') {
        raw = await jsonpgzRequest(mergedParam.code || api.defaultParam.code);
      } else if (api.method === 'jsonp') {
        const actualUrl = url.replace(/_cb/g, cb);
        raw = await jsonpRequest(actualUrl, cb);
      } else if (api.method === 'script') {
        raw = await scriptTagLoad(url, api.globalVar);
      } else if (api.method === 'apidata') {
        raw = await apidataLoad(url);
      } else if (api.method === 'fetch-gbk') {
        raw = await fetchGbk(url);
      } else if (api.method === 'fetch') {
        raw = await fetchJson(url);
      }
      // Success — break out of retry loop
      break;
    } catch(e) {
      if (attempt === 0) {
        // First attempt failed, wait 500ms and retry
        await new Promise(r => setTimeout(r, 500));
        continue;
      }
      // Second attempt also failed
      const elapsed = Math.round(performance.now() - t0);
      return { status: STATUSES.error, elapsed, raw: null, extracted: null, error: e.message };
    }
  }

  const elapsed = Math.round(performance.now() - t0);
  const valid = api.validate(raw);
  const extracted = valid && api.extract ? api.extract(raw) : raw;
  return { status: valid ? STATUSES.success : STATUSES.error, elapsed, raw, extracted, error: valid ? null : raw };
}

// ==================== Rendering ====================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  for (const [key, board] of Object.entries(API_REGISTRY)) {
    const item = document.createElement('div');
    item.className = `sidebar-item${state.activeBoard === key ? ' active' : ''}`;
    item.innerHTML = `<span class="icon">${board.icon}</span>${board.label}<span class="sidebar-count">${board.apis.length}</span>`;
    item.onclick = () => { state.activeBoard = key; renderSidebar(); renderGrid(); };
    sb.appendChild(item);
  }
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const all = Object.values(API_REGISTRY).flatMap(b => b.apis);
  const results = Object.values(state.results);
  const total = all.length;
  const tested = results.length;
  const ok = results.filter(r => r.status === STATUSES.success).length;
  const fail = results.filter(r => r.status === STATUSES.error).length;
  const avgMs = tested > 0 ? Math.round(results.reduce((s,r) => s + (r.elapsed||0), 0) / tested) : 0;
  bar.innerHTML = `
    <div class="stat-card"><span class="label">接口总数</span><span class="value blue">${total}</span></div>
    <div class="stat-card"><span class="label">已检测</span><span class="value">${tested}</span></div>
    <div class="stat-card"><span class="label">可用</span><span class="value green">${ok}</span></div>
    <div class="stat-card"><span class="label">失败</span><span class="value red">${fail}</span></div>
    <div class="stat-card"><span class="label">平均耗时</span><span class="value yellow">${avgMs}ms</span></div>
  `;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const board = API_REGISTRY[state.activeBoard];
  if (!board) return;
  for (const api of board.apis) {
    const res = state.results[api.id];
    const status = res?.status || STATUSES.idle;
    const card = document.createElement('div');
    card.id = `card-${api.id}`;
    card.className = 'card';

    let paramHtml = '';
    for (const [k, v] of Object.entries(api.defaultParam || {})) {
      paramHtml += `<div class="param-row"><span class="param-label">${api.paramHints[k]||k}</span><input class="param-input" data-key="${k}" value="${v}" placeholder="${api.paramHints[k]||k}"></div>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <span class="name">${api.name}</span>
        <span class="badge-status ${STATUS_CLASS[status]}">${STATUS_TEXT[status]}</span>
      </div>
      <div class="card-body">
        ${paramHtml}
      </div>
      <div class="card-footer">
        <button class="btn-test" onclick="runSingle('${api.id}')" ${state.running?'disabled':''}>验证</button>
        <span class="result-time">${res?.elapsed ? res.elapsed+'ms' : ''}</span>
        <span class="result-detail">${res?.error ? truncate(typeof res.error === 'string' ? res.error : JSON.stringify(res.error), 60) : (res?.extracted ? truncate(JSON.stringify(res.extracted), 60) : '')}</span>
      </div>
      <div class="card-expand">
        <span class="expand-toggle" onclick="toggleExpand('${api.id}')">▶ 查看响应</span>
        <pre class="response-box" id="resp-${api.id}"></pre>
      </div>
    `;
    grid.appendChild(card);
  }
  renderStats();
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '...' : s; }

function toggleExpand(id) {
  const box = document.getElementById(`resp-${id}`);
  const toggle = box.previousElementSibling;
  if (box.classList.contains('show')) {
    box.classList.remove('show');
    toggle.textContent = '▶ 查看响应';
  } else {
    const res = state.results[id];
    if (res) {
      box.textContent = JSON.stringify(res.extracted || res.raw || res.error, null, 2);
    } else {
      box.textContent = '暂无数据';
    }
    box.classList.add('show');
    toggle.textContent = '▼ 收起响应';
  }
}

function updateCard(apiId) {
  const api = findApi(apiId);
  const res = state.results[apiId];
  if (!api || !res) return;
  const card = document.getElementById(`card-${apiId}`);
  if (!card) return;
  const badge = card.querySelector('.badge-status');
  badge.className = `badge-status ${STATUS_CLASS[res.status]}`;
  badge.textContent = STATUS_TEXT[res.status];
  card.querySelector('.btn-test').disabled = false;
  card.querySelector('.result-time').textContent = res.elapsed ? res.elapsed + 'ms' : '';
  card.querySelector('.result-detail').textContent = res.error ? truncate(typeof res.error === 'string' ? res.error : JSON.stringify(res.error), 60) : (res.extracted ? truncate(JSON.stringify(res.extracted), 60) : '');
  const box = document.getElementById(`resp-${apiId}`);
  if (box.classList.contains('show')) {
    box.textContent = JSON.stringify(res.extracted || res.raw || res.error, null, 2);
  }
  renderStats();
  showExportButton();
}

function findApi(id) {
  for (const board of Object.values(API_REGISTRY)) {
    const a = board.apis.find(a => a.id === id);
    if (a) return a;
  }
  return null;
}

// ==================== Actions ====================
async function runSingle(apiId) {
  const api = findApi(apiId);
  if (!api) return;
  state.results[apiId] = { status: STATUSES.loading, elapsed: 0, raw: null, extracted: null, error: null };
  const card = document.getElementById(`card-${apiId}`);
  if (card) {
    const badge = card.querySelector('.badge-status');
    badge.className = 'badge-status badge-loading';
    badge.textContent = STATUS_TEXT[STATUSES.loading];
    card.querySelector('.btn-test').disabled = true;
  }
  const res = await runTest(api);
  state.results[apiId] = res;
  updateCard(apiId);
}

async function runAll() {
  if (state.running) return;
  state.running = true;
  document.getElementById('btnAll').disabled = true;
  document.getElementById('statusBadge').textContent = '验证中...';

  // Run all apis across all boards
  const allApis = Object.values(API_REGISTRY).flatMap(b => b.apis);
  // Init all to loading
  for (const api of allApis) {
    state.results[api.id] = { status: STATUSES.loading, elapsed: 0, raw: null, extracted: null, error: null };
  }
  renderGrid();

  // Run with concurrency 3
  const queue = [...allApis];
  const running = new Set();
  while (queue.length > 0 || running.size > 0) {
    while (queue.length > 0 && running.size < 3) {
      const api = queue.shift();
      const p = runTest(api).then(res => {
        state.results[api.id] = res;
        updateCard(api.id);
        running.delete(p);
      });
      running.add(p);
    }
    if (running.size > 0) await Promise.race(running);
  }

  state.running = false;
  document.getElementById('btnAll').disabled = false;
  const ok = Object.values(state.results).filter(r => r.status === STATUSES.success).length;
  const total = Object.values(state.results).length;
  document.getElementById('statusBadge').textContent = `${ok}/${total} 可用`;
  renderStats();
}

function resetAll() {
  state.results = {};
  state.running = false;
  document.getElementById('btnAll').disabled = false;
  document.getElementById('statusBadge').textContent = '就绪';
  renderGrid();
}

// ==================== Export Log ====================
function exportLog() {
  const log = {
    timestamp: new Date().toISOString(),
    summary: {},
    results: {}
  };

  for (const [boardKey, board] of Object.entries(API_REGISTRY)) {
    const boardApis = board.apis;
    const ok = boardApis.filter(a => state.results[a.id]?.status === STATUSES.success).length;
    const fail = boardApis.filter(a => state.results[a.id]?.status === STATUSES.error).length;
    const idle = boardApis.filter(a => !state.results[a.id] || state.results[a.id].status === STATUSES.idle).length;
    log.summary[boardKey] = { label: board.label, total: boardApis.length, ok, fail, idle };
  }

  for (const [id, res] of Object.entries(state.results)) {
    const api = findApi(id);
    log.results[id] = {
      name: api?.name || id,
      board: api ? Object.entries(API_REGISTRY).find(([_, b]) => b.apis.includes(api))?.[0] : 'unknown',
      method: api?.method,
      status: res.status,
      elapsed: res.elapsed,
      error: res.error || null,
      url: api ? api.buildUrl({ ...api.defaultParam, ...(state.results[id]?._customParams || {}) }) : null,
      responsePreview: res.raw ? JSON.stringify(res.raw).slice(0, 500) : null,
    };
  }

  const blob = new Blob([JSON.stringify(log, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `validator-log-${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function showExportButton() {
  const btn = document.getElementById('btnExport');
  if (btn && Object.keys(state.results).length > 0) {
    btn.style.display = '';
  }
}

// ==================== Init ====================
renderSidebar();
renderGrid();
</script>
